version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./temp:/app/temp
      - ./instance:/app/instance
      - ./models:/app/models
    environment:
      - DATABASE_URL=sqlite:///instance/database.db
      - DEBUG=True
    restart: unless-stopped

  # Optional PostgreSQL database
  # db:
  #   image: postgres:15
